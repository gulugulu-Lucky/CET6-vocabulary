name: Bootstrap CET6 MCP data

on:
  push:
    paths:
      - '.github/workflows/bootstrap-cet6-mcp.yml'
      - 'mcp/cet6-vocab-mcp/**'
      - '阅读重点词_28词_刷词网页(1).html'
      - '手写单词本_179词_刷词网页_词义核对修正版.html'
      - '六级词汇闪过_前九单元词义终校_补identify版.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate words and templates
        run: |
          python mcp/cet6-vocab-mcp/scripts/bootstrap_from_repo_html.py
          python mcp/cet6-vocab-mcp/server.py lists
          python mcp/cet6-vocab-mcp/server.py build-preview --list all
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mcp/cet6-vocab-mcp
          if git diff --cached --quiet; then
            echo "No generated MCP changes."
          else
            git commit -m "Bootstrap CET6 MCP generated data"
            git push
          fi
