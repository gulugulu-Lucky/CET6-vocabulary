name: Fix CET6 page bug

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
      - name: Add missing historyStack variable
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('六级词汇闪过_前九单元词义终校_补identify版.html')
          text = p.read_text(encoding='utf-8')
          if 'let historyStack' not in text:
              text = text.replace('let shown = false;\n', 'let shown = false;\nlet historyStack = [];\n', 1)
              p.write_text(text, encoding='utf-8')
          PY
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 六级词汇闪过_前九单元词义终校_补identify版.html
          git diff --cached --quiet || git commit -m "Fix CET6 page navigation"
          git push
