<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">

<title>手写单词本｜179词刷词｜底部读音按钮</title>
<style>
:root {
  --bg1:#fff7fb; --bg2:#eef5ff; --card:#ffffffcc; --text:#253047;
  --muted:#6d7890; --accent:#ff75a0; --accent2:#7c8cff; --good:#26a269; --bad:#e35d6a;
  --shadow: 0 18px 55px rgba(80, 79, 140, .18);
}
* { box-sizing: border-box; }
body {
  margin:0; min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  color:var(--text); background:radial-gradient(circle at top left,var(--bg1),transparent 42%),linear-gradient(135deg,#fff,var(--bg2));
}
.app { width:min(920px,100%); margin:0 auto; padding:10px 16px 28px; }
.panel { background:var(--card); backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,.7); border-radius:26px; padding:16px; box-shadow:var(--shadow); }
.controls { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
button { font:inherit; border:0; border-radius:16px; padding:12px 14px; background:#fff; color:var(--text); box-shadow:inset 0 0 0 1px #edf0fa; cursor:pointer; transition:none; font-weight:650; }
button:active { transform:none; }
.secondary { background:#f7f8ff; }
.card { min-height:382px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:14px; background:#fff; border-radius:28px; padding:34px 18px; margin-top:8px; position:relative; overflow:hidden; }
.card:before { content:""; position:absolute; width:180px; height:180px; border-radius:50%; background:#fff0f6; top:-72px; right:-72px; }
.unit-tag { position:absolute; top:18px; left:20px; color:var(--muted); font-size:13px; }
.word { font-size:48px; font-weight:800; letter-spacing:.4px; line-height:1.08; word-break:break-word; z-index:1; }
.sound-btn { z-index:1; width:72px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; background:#f7f8ff; color:#253047; box-shadow:inset 0 0 0 1px #e7ebf7; padding:0; }
.meaning { z-index:1; min-height:58px; font-size:23px; line-height:1.45; color:#34415f; padding:0 14px; display:none; white-space:pre-line; }
.meaning.show { display:block; }
.ipa { z-index:1; min-height:28px; font-size:19px; color:var(--muted); letter-spacing:.3px; display:none; }
.ipa.show { display:block; }
.actions { display:grid; grid-template-columns:1fr 72px 1fr; gap:10px; margin-top:12px; }
.good { background:#ebfff5; color:var(--good); }
.bad { background:#fff0f2; color:var(--bad); }
.progress-wrap { height:10px; background:#eef1fb; border-radius:999px; overflow:hidden; margin:14px 2px 8px; }
.progress { height:100%; width:0%; background:linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:999px; transition:.2s width; }
.stats { display:flex; justify-content:space-between; gap:8px; color:var(--muted); font-size:13px; flex-wrap:wrap; }
.modebar { display:flex; gap:8px; flex-wrap:wrap; margin:12px 0 0; }
.chip { padding:9px 11px; border-radius:999px; background:#fff; box-shadow:inset 0 0 0 1px #edf0fa; font-size:13px; }
.chip.active { background:#253047; color:white; }
.footer { text-align:center; color:var(--muted); font-size:12px; margin-top:14px; }
@media (max-width:720px) {
  .controls { grid-template-columns:1fr; }
  .word { font-size:40px; }
  .meaning { font-size:20px; }
  .ipa { font-size:18px; }
  .card { min-height:385px; }
}

html, body, button, .card {
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
button, .card, .word, .meaning, .ipa {
  user-select: none;
  -webkit-user-select: none;
}

</style>
</head>

<div class="app">

    </div>
  </div>
</div>

let order = [];
let idx = 0;
let mode = 'all';
let shown = false;
const $ = id => document.getElementById(id);
const key = () => 'handwritten_vocab_179_audio_ipa_v1';
const state = () => JSON.parse(localStorage.getItem(key()) || '{}');
const save = s => localStorage.setItem(key(), JSON.stringify(s));

function currentItem() {
  if (!order.length) return null;
  return DATA[order[idx]];
}
function filteredIndexes() {
  const s = state();
  return DATA.map((_, i) => i).filter(i => {
    if (mode === 'unknown') return s[i] === 'unknown';
    if (mode === 'unseen') return !s[i];
    return true;
  });
}
function shuffleArray(a) {
  for (let i=a.length-1; i>0; i--) {
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}
function resetYesButton() { $('yesBtn').textContent = '会，显示意思'; }
function resetBothButtons() { resetYesButton(); resetNoButton(); }
function afterShowButton() { $('yesBtn').textContent = '记住了，过'; }
function rebuildOrder(shuffle=false) {
  order = filteredIndexes();
  if (shuffle) shuffleArray(order);
  idx = 0;
  render();
}
function updateStats() {
  const s = state();
  const known = Object.values(s).filter(v=>v==='known').length;
  const unknown = Object.values(s).filter(v=>v==='unknown').length;
  const done = known + unknown;
  $('progress').style.width = DATA.length ? (done/DATA.length*100)+'%' : '0%';
  $('knownText').textContent = '会：' + known;
  $('unknownText').textContent = '重点：' + unknown;
  $('posText').textContent = order.length ? ((idx+1)+' / '+order.length+' 当前｜'+done+' / '+DATA.length+' 已刷') : (done+' / '+DATA.length+' 已刷');
}
function render() {
  updateStats();
  if (!order.length) {
    $('word').textContent = mode==='unknown' ? '暂时没有“不会”词' : mode==='unseen' ? '未刷词清空啦' : '没有词条';
    $('meaning').textContent = '换个模式或重置记录就可以继续刷。';
    $('meaning').classList.add('show');
    $('ipa').textContent = '';
    $('ipa').classList.remove('show');
    resetBothButtons();
    return;
  }
  if (idx >= order.length) idx = 0;
  const item = currentItem();
  shown = false;
  $('unitTag').textContent = '手写单词本 · ' + item.source;
  $('word').textContent = item.word;
  $('meaning').textContent = item.meaning;
  $('meaning').classList.remove('show');
  $('ipa').textContent = item.ipa;
  $('ipa').classList.remove('show');
  updateStats();
  resetBothButtons();
}
function speakWord() {
  const item = currentItem();
  if (!item || !('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(item.word);
  utter.lang = 'en-US';
  utter.rate = 0.82;
  utter.pitch = 1;
  window.speechSynthesis.speak(utter);
}
function showMeaning() {
  if (!order.length) return;
  shown = true;
  $('meaning').classList.add('show');
  $('ipa').classList.add('show');
  afterShowButton();
  afterShowNoButton();
}
function mark(v) {
  if (!order.length) return;
  const s = state();
  s[order[idx]] = v;
  save(s);
  idx++;
  render();
}
function resetNoButton() { $('noBtn').textContent = '不会，看意思'; }
function afterShowNoButton() { $('noBtn').textContent = '加入重点，下一个'; }

function noReview() {
  if (!order.length) return;
  if (!shown) {
    showMeaning();
    speakWord();
    afterShowNoButton();
  } else {
    const s = state();
    s[order[idx]] = 'unknown';
    save(s);
    idx++;
    render();
  }
}
function yesReview() {
  if (!order.length) return;
  if (!shown) {
    showMeaning();
    speakWord();
  } else {
    mark('known');
  }
}
function next() { idx++; render(); }
$('shuffleBtn').onclick = () => rebuildOrder(true);
$('resetBtn').onclick = () => { localStorage.removeItem(key()); rebuildOrder(false); };
$('yesBtn').onclick = yesReview;
$('noBtn').onclick = noReview;
$('soundBtn').onclick = (e) => { e.stopPropagation(); speakWord(); };
$('card').onclick = showMeaning;
document.querySelectorAll('.chip').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    rebuildOrder(false);
  };
});
document.addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); shown ? next() : showMeaning(); }
  if (e.key === 'ArrowRight') yesReview();
  if (e.key === 'ArrowLeft') noReview();
  if (e.key === 'ArrowDown') next();
  if (e.key.toLowerCase() === 'p') speakWord();
});
rebuildOrder(false);
</script>
</body>
</html>
