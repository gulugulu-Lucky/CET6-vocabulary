<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>阅读重点词｜28词刷词</title>
<style>
:root {
  --bg1:#fff7fb; --bg2:#eef5ff; --card:#ffffffcc; --text:#253047;
  --muted:#6d7890; --accent:#ff75a0; --accent2:#7c8cff; --good:#26a269; --bad:#e35d6a;
  --shadow: 0 18px 55px rgba(80,79,140,.18);
}
* { box-sizing:border-box; }
body {
  margin:0; min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  color:var(--text); background:radial-gradient(circle at top left,var(--bg1),transparent 42%),linear-gradient(135deg,#fff,var(--bg2));
}
.app { width:min(920px,100%); margin:0 auto; padding:10px 16px 28px; }
.panel { background:var(--card); backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,.7); border-radius:26px; padding:16px; box-shadow:var(--shadow); }
.controls { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
button { font:inherit; border:0; border-radius:16px; padding:12px 14px; background:#fff; color:var(--text); box-shadow:inset 0 0 0 1px #edf0fa; cursor:pointer; transition:none; font-weight:650; }
button:active { transform:none; }
.secondary { background:#f7f8ff; }
.card { min-height:380px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:15px; background:#fff; border-radius:28px; padding:34px 18px; margin-top:8px; position:relative; overflow:hidden; }
.card:before { content:""; position:absolute; width:180px; height:180px; border-radius:50%; background:#fff0f6; top:-72px; right:-72px; }
.unit-tag { position:absolute; top:18px; left:20px; color:var(--muted); font-size:13px; }
.word { font-size:48px; font-weight:800; letter-spacing:.4px; line-height:1.08; word-break:break-word; z-index:1; }
.meaning { z-index:1; min-height:60px; font-size:23px; line-height:1.45; color:#34415f; padding:0 14px; display:none; white-space:pre-line; }
.meaning.show { display:block; }
.ipa { z-index:1; min-height:30px; font-size:20px; color:var(--muted); letter-spacing:.3px; display:none; }
.ipa.show { display:block; }
.actions { display:grid; grid-template-columns:1fr 72px 1fr; gap:10px; margin-top:12px; }
.good { background:#ebfff5; color:var(--good); }
.bad { background:#fff0f2; color:var(--bad); }
.sound-btn { width:72px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; background:#f7f8ff; color:#253047; box-shadow:inset 0 0 0 1px #e7ebf7; padding:0; }
.progress-wrap { height:10px; background:#eef1fb; border-radius:999px; overflow:hidden; margin:14px 2px 8px; }
.progress { height:100%; width:0%; background:linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:999px; transition:.2s width; }
.stats { display:flex; justify-content:space-between; gap:8px; color:var(--muted); font-size:13px; flex-wrap:wrap; }
.modebar { display:flex; gap:8px; flex-wrap:wrap; margin:12px 0 0; }
.chip { padding:9px 11px; border-radius:999px; background:#fff; box-shadow:inset 0 0 0 1px #edf0fa; font-size:13px; }
.chip.active { background:#253047; color:white; }
html, body, button, .card { -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
button, .card, .word, .meaning, .ipa { user-select:none; -webkit-user-select:none; }
@media (max-width:720px) {
  .controls { grid-template-columns:1fr; }
  .word { font-size:40px; }
  .meaning { font-size:20px; }
  .ipa { font-size:18px; }
  .card { min-height:385px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="panel">
    <div class="controls">
      <button class="secondary" id="shuffleBtn">打乱顺序</button>
      <button class="secondary" id="resetBtn">重置记录</button>
    </div>
    <div class="modebar">
      <button class="chip active" data-mode="all">全部</button>
      <button class="chip" data-mode="unknown">只刷不会</button>
      <button class="chip" data-mode="unseen">只刷未刷</button>
    </div>
    <div class="progress-wrap"><div class="progress" id="progress"></div></div>
    <div class="stats">
      <span id="posText"></span><span id="knownText"></span><span id="unknownText"></span>
    </div>
    <div class="card" id="card">
      <div class="unit-tag" id="unitTag">阅读重点词</div>
      <div class="word" id="word">Ready?</div>
      <div class="meaning" id="meaning"></div>
      <div class="ipa" id="ipa"></div>
    </div>
    <div class="actions">
      <button class="bad" id="noBtn">不会，看意思</button>
      <button class="sound-btn" id="soundBtn" title="播放读音" aria-label="播放读音">🔊</button>
      <button class="good" id="yesBtn">会，显示意思</button>
    </div>
  </div>
</div>

<script>
const DATA = [{"id": 1, "unit": "Passage 1", "word": "sarcasm", "ipa": "/ˈsɑːrkæzəm/", "meaning": "n. 讽刺；挖苦"}, {"id": 2, "unit": "Passage 1", "word": "disguise", "ipa": "/dɪsˈɡaɪz/", "meaning": "v. 伪装；掩饰\nn. 伪装"}, {"id": 3, "unit": "Passage 1", "word": "subtle", "ipa": "/ˈsʌtl/", "meaning": "adj. 微妙的；不易察觉的"}, {"id": 4, "unit": "Passage 1", "word": "sparingly", "ipa": "/ˈsperɪŋli/", "meaning": "adv. 节制地；少量地"}, {"id": 5, "unit": "Passage 1", "word": "potent", "ipa": "/ˈpoʊtnt/", "meaning": "adj. 强有力的；有效的"}, {"id": 6, "unit": "Passage 1", "word": "recipient", "ipa": "/rɪˈsɪpiənt/", "meaning": "n. 接收者；接受者"}, {"id": 7, "unit": "Passage 1", "word": "wit", "ipa": "/wɪt/", "meaning": "n. 机智；风趣"}, {"id": 8, "unit": "Passage 2", "word": "variability", "ipa": "/ˌveriəˈbɪləti/", "meaning": "n. 变化性；可变性"}, {"id": 9, "unit": "Passage 2", "word": "tennis", "ipa": "/ˈtenɪs/", "meaning": "n. 网球"}, {"id": 10, "unit": "Passage 2", "word": "generalisation", "ipa": "/ˌdʒenrələˈzeɪʃn/", "meaning": "n. 概括；归纳；泛化"}, {"id": 11, "unit": "Passage 2", "word": "principle", "ipa": "/ˈprɪnsəpl/", "meaning": "n. 原则；原理"}, {"id": 12, "unit": "Passage 2", "word": "generalise", "ipa": "/ˈdʒenrəlaɪz/", "meaning": "v. 概括；归纳；推广"}, {"id": 13, "unit": "Passage 2", "word": "pattern", "ipa": "/ˈpætərn/", "meaning": "n. 模式；规律；图案"}, {"id": 14, "unit": "Passage 2", "word": "affect", "ipa": "/əˈfekt/", "meaning": "v. 影响"}, {"id": 15, "unit": "Passage 2", "word": "spark", "ipa": "/spɑːrk/", "meaning": "v. 激发；引发\nn. 火花"}, {"id": 16, "unit": "Passage 3", "word": "sustainability", "ipa": "/səˌsteɪnəˈbɪləti/", "meaning": "n. 可持续性"}, {"id": 17, "unit": "Passage 3", "word": "scarce", "ipa": "/skers/", "meaning": "adj. 缺乏的；稀少的"}, {"id": 18, "unit": "Passage 3", "word": "tranquil", "ipa": "/ˈtræŋkwɪl/", "meaning": "adj. 宁静的；平静的"}, {"id": 19, "unit": "Passage 3", "word": "whilst", "ipa": "/waɪlst/", "meaning": "conj. 当……时；然而"}, {"id": 20, "unit": "Passage 3", "word": "dense", "ipa": "/dens/", "meaning": "adj. 稠密的；密集的"}, {"id": 21, "unit": "Passage 3", "word": "desolation", "ipa": "/ˌdesəˈleɪʃn/", "meaning": "n. 荒凉；萧条"}, {"id": 22, "unit": "Passage 3", "word": "intermittent", "ipa": "/ˌɪntərˈmɪtənt/", "meaning": "adj. 间歇的；断断续续的"}, {"id": 23, "unit": "Passage 3", "word": "automobile", "ipa": "/ˈɔːtəməbiːl/", "meaning": "n. 汽车"}, {"id": 24, "unit": "Passage 3", "word": "detach", "ipa": "/dɪˈtætʃ/", "meaning": "v. 分离；使脱离"}, {"id": 25, "unit": "Passage 3", "word": "deplorable", "ipa": "/dɪˈplɔːrəbl/", "meaning": "adj. 糟糕的；令人遗憾的"}, {"id": 26, "unit": "Passage 3", "word": "division", "ipa": "/dɪˈvɪʒn/", "meaning": "n. 分工；划分"}, {"id": 27, "unit": "Passage 3", "word": "affordability", "ipa": "/əˌfɔːrdəˈbɪləti/", "meaning": "n. 负担能力；支付能力"}, {"id": 28, "unit": "Passage 3", "word": "urbanise", "ipa": "/ˈɜːrbənaɪz/", "meaning": "v. （使）城市化"}];
let order = [];
let idx = 0;
let mode = 'all';
let shown = false;
const $ = id => document.getElementById(id);
const key = () => 'reading_vocab_28_v1';
const state = () => JSON.parse(localStorage.getItem(key()) || '{}');
const save = s => localStorage.setItem(key(), JSON.stringify(s));
function currentItem() { return order.length ? DATA[order[idx]] : null; }
function filteredIndexes() {
  const s = state();
  return DATA.map((_, i) => i).filter(i => {
    if (mode === 'unknown') return s[i] === 'unknown';
    if (mode === 'unseen') return !s[i];
    return true;
  });
}
function shuffleArray(a) {
  for (let i=a.length-1; i>0; i--) {
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}
function resetButtons() {
  $('yesBtn').textContent = '会，显示意思';
  $('noBtn').textContent = '不会，看意思';
}
function afterShowButtons() {
  $('yesBtn').textContent = '记住了，过';
  $('noBtn').textContent = '加入重点，下一个';
}
function rebuildOrder(shuffle=false) {
  order = filteredIndexes();
  if (shuffle) shuffleArray(order);
  idx = 0;
  render();
}
function updateStats() {
  const s = state();
  const known = Object.values(s).filter(v=>v==='known').length;
  const unknown = Object.values(s).filter(v=>v==='unknown').length;
  const done = known + unknown;
  $('progress').style.width = DATA.length ? (done/DATA.length*100)+'%' : '0%';
  $('knownText').textContent = '会：' + known;
  $('unknownText').textContent = '重点：' + unknown;
  $('posText').textContent = order.length ? ((idx+1)+' / '+order.length+' 当前｜'+done+' / '+DATA.length+' 已刷') : (done+' / '+DATA.length+' 已刷');
}
function render() {
  updateStats();
  if (!order.length) {
    $('unitTag').textContent = '阅读重点词';
    $('word').textContent = mode==='unknown' ? '暂时没有“不会”词' : mode==='unseen' ? '未刷词清空啦' : '没有词条';
    $('meaning').textContent = '换个模式或重置记录就可以继续刷。';
    $('meaning').classList.add('show');
    $('ipa').textContent = '';
    $('ipa').classList.remove('show');
    resetButtons();
    return;
  }
  if (idx >= order.length) idx = 0;
  const item = currentItem();
  shown = false;
  $('unitTag').textContent = item.unit + ' · 阅读重点';
  $('word').textContent = item.word;
  $('meaning').textContent = item.meaning;
  $('ipa').textContent = item.ipa;
  $('meaning').classList.remove('show');
  $('ipa').classList.remove('show');
  updateStats();
  resetButtons();
}
function showMeaning() {
  if (!order.length) return;
  shown = true;
  $('meaning').classList.add('show');
  $('ipa').classList.add('show');
  afterShowButtons();
}
function speakWord() {
  const item = currentItem();
  if (!item || !('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(item.word);
  utter.lang = 'en-US';
  utter.rate = 0.82;
  utter.pitch = 1;
  window.speechSynthesis.speak(utter);
}
function mark(v) {
  if (!order.length) return;
  const s = state();
  s[order[idx]] = v;
  save(s);
  idx++;
  render();
}
function yesReview() {
  if (!order.length) return;
  if (!shown) { showMeaning(); speakWord(); }
  else mark('known');
}
function noReview() {
  if (!order.length) return;
  if (!shown) { showMeaning(); speakWord(); }
  else mark('unknown');
}
function next() { idx++; render(); }
$('shuffleBtn').onclick = () => rebuildOrder(true);
$('resetBtn').onclick = () => { localStorage.removeItem(key()); rebuildOrder(false); };
$('yesBtn').onclick = yesReview;
$('noBtn').onclick = noReview;
$('soundBtn').onclick = e => { e.stopPropagation(); speakWord(); };
$('card').onclick = showMeaning;
document.querySelectorAll('.chip').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    rebuildOrder(false);
  };
});
document.addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); shown ? next() : (showMeaning(), speakWord()); }
  if (e.key === 'ArrowRight') yesReview();
  if (e.key === 'ArrowLeft') noReview();
  if (e.key === 'ArrowDown') next();
  if (e.key.toLowerCase() === 'p') speakWord();
});
rebuildOrder(false);
</script>
</body>
</html>
